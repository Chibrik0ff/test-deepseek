name: Update README from DeepSeek

on:
  workflow_dispatch:
    inputs:
      instruction:
        description: 'Что сделать с файлом? (например: "добавь слово привет в начало")'
        required: true
        default: 'напиши "привет" в начале файла'
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install requests
        run: pip install requests

      - name: Call DeepSeek API and update README
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          INSTRUCTION: ${{ github.event.inputs.instruction }}
        run: |
          python - <<EOF
          import requests
          import os
          import json

          # Читаем текущий README.md
          with open("README.md", "r", encoding="utf-8") as f:
              current_text = f.read()

          print("Текущий текст прочитан. Длина:", len(current_text))

          # Отправляем запрос в DeepSeek
          headers = {
              "Authorization": f"Bearer {os.environ['DEEPSEEK_API_KEY']}",
              "Content-Type": "application/json"
          }
          
          payload = {
              "model": "deepseek-chat",
              "messages": [
                  {"role": "system", "content": "Ты меняешь только содержимое файла README.md. Возвращаешь только новый полный текст файла без лишних пояснений."},
                  {"role": "user", "content": f"Текущее содержимое файла:\n---\n{current_text}\n---\n\nЗадача: {os.environ['INSTRUCTION']}\n\nНапиши новый полный текст файла с учётом задачи."}
              ]
          }
          
          print("Отправляю запрос в DeepSeek API...")
          response = requests.post(
              "https://api.deepseek.com/v1/chat/completions",
              headers=headers,
              json=payload,
              timeout=30
          )
          
          print(f"Статус ответа: {response.status_code}")
          print(f"Заголовки: {dict(response.headers)}")
          print(f"Тело ответа (первые 500 символов): {response.text[:500]}")
          
          if response.status_code != 200:
              print(f"Ошибка API: {response.text}")
              exit(1)
          
          result = response.json()
          new_text = result["choices"][0]["message"]["content"]
          
          print("Новый текст получен. Длина:", len(new_text))
          
          # Сохраняем изменения
          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_text)
          
          print("Файл обновлён")
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Update README.md via DeepSeek: ${{ github.event.inputs.instruction }}"
          git push
